name: bidichan
options:
  bundleIdPrefix: torkve
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

# DEVELOPMENT_TEAM, CODE_SIGN_STYLE and the per-target provisioning profile
# specifiers live in xcconfig so CI can inject them without touching this file.
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Manual
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only — avoids iPad multitasking orientation rules
    # DEVELOPMENT_TEAM is supplied by Config/*.xcconfig (from a CI secret).

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  # ---------------------------------------------------------------- framework
  BidichanKit:
    type: framework
    platform: iOS
    sources:
      - Sources/BidichanKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: torkve.bidichan.kit
        DEFINES_MODULE: YES
        # Generate the framework's Info.plist (no explicit info: block); without
        # this the embedded framework has no Info.plist and the archive fails.
        GENERATE_INFOPLIST_FILE: YES
        # Not code-signed on its own; embedded & signed by the app.
        CODE_SIGNING_ALLOWED: NO

  # ----------------------------------------------------------------- main app
  bidichan:
    type: application
    platform: iOS
    sources:
      - Sources/App
    info:
      path: Config/App-Info.plist
      properties:
        CFBundleDisplayName: bidichan
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - target: BidichanKit
        embed: true
      - target: BidichanTunnel
        embed: true                 # copies the .appex into PlugIns/
      - package: SwiftTerm
      # The Go framework is embedded ONCE in the app (not the extension — an
      # .appex may not contain nested frameworks). The app doesn't use it, so
      # embed without linking; the extension links it and finds it at runtime.
      - framework: Vendor/Bidichan.xcframework
        embed: true
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: torkve.bidichan
        PROVISIONING_PROFILE_SPECIFIER: $(PP_APP)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"   # override XcodeGen's universal preset
        # Point at the committed entitlements file directly (XcodeGen's
        # entitlements: block was not applying it, so the networkextension
        # entitlement was missing from the signed app).
        CODE_SIGN_ENTITLEMENTS: Config/App.entitlements
        # Set here (not globally) so it beats XcodeGen's preset default without
        # leaking manual-signing onto SwiftPM deps (e.g. SwiftTerm).
        CODE_SIGN_IDENTITY: "Apple Distribution"
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Distribution"

  # ------------------------------------------------- packet tunnel extension
  BidichanTunnel:
    type: app-extension
    platform: iOS
    sources:
      - Sources/Tunnel
    info:
      path: Config/Tunnel-Info.plist
      properties:
        CFBundleDisplayName: bidichan-tunnel
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    dependencies:
      - target: BidichanKit
        embed: false                # the app embeds the single copy
      # Link the Go framework but do NOT embed it — the app embeds it; the
      # extension finds it at runtime in the app's Frameworks/.
      - framework: Vendor/Bidichan.xcframework
        embed: false
        link: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: torkve.bidichan.tunnel
        PROVISIONING_PROFILE_SPECIFIER: $(PP_TUNNEL)
        CODE_SIGN_ENTITLEMENTS: Config/Tunnel.entitlements
        CODE_SIGN_IDENTITY: "Apple Distribution"
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Distribution"
