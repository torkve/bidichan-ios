name: bootstrap-signing

# Run ONCE (manually) after the one-time Portal setup (SETUP.md) to register
# your device(s) and create the signing certificates & provisioning profiles
# into the match git repo.
on:
  workflow_dispatch:
    inputs:
      nuke_first:
        description: "Revoke all existing dev/distribution certs first (fixes 'reached the maximum number of certificates')"
        default: false
        type: boolean

jobs:
  bootstrap:
    runs-on: macos-26
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Job-level so it's usable in the step `if:` (the secrets context is not).
      DEVICE_UDIDS: ${{ secrets.DEVICE_UDIDS }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # devices.txt is not in the repo (public); build it from the secret so the
      # UDID never lands in git. Secret format: one "UDID Name" per line.
      - name: Materialize devices.txt from secret
        if: ${{ env.DEVICE_UDIDS != '' }}
        run: |
          {
            printf 'Device ID\tDevice Name\n'
            while IFS= read -r line; do
              [ -z "${line// }" ] && continue
              case "$line" in \#*) continue ;; esac
              udid=${line%%[[:space:]]*}
              name=${line#"$udid"}
              name=${name# }
              [ -z "$name" ] && name="device"
              printf '%s\t%s\n' "$udid" "$name"
            done <<< "$DEVICE_UDIDS"
          } > fastlane/devices.txt

      - name: Revoke orphaned certs (optional)
        if: ${{ inputs.nuke_first }}
        run: bundle exec fastlane nuke

      - name: Register devices + create certs & profiles
        run: bundle exec fastlane bootstrap
