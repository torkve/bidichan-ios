name: bootstrap-signing

# Run ONCE (manually) after enrolling, to register bundle IDs + capabilities,
# your device(s), and to create the signing certificates & provisioning
# profiles into the match git repo. See SETUP.md.
on:
  workflow_dispatch:
    inputs:
      run_app_groups:
        description: "Also create/associate the App Group (may need an Apple-ID session)"
        default: false
        type: boolean

jobs:
  bootstrap:
    runs-on: macos-26
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Only needed if run_app_groups is true and produce falls back to Apple ID:
      FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APP_SPECIFIC_PASSWORD }}
      # Job-level so it's usable in the step `if:` (the secrets context is not).
      DEVICE_UDIDS: ${{ secrets.DEVICE_UDIDS }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # devices.txt is not in the repo (public); build it from the secret so the
      # UDID never lands in git. Secret format: one "UDID Name" per line.
      - name: Materialize devices.txt from secret
        if: ${{ env.DEVICE_UDIDS != '' }}
        run: |
          {
            printf 'Device ID\tDevice Name\n'
            while IFS= read -r line; do
              [ -z "${line// }" ] && continue
              case "$line" in \#*) continue ;; esac
              udid=${line%%[[:space:]]*}
              name=${line#"$udid"}
              name=${name# }
              [ -z "$name" ] && name="device"
              printf '%s\t%s\n' "$udid" "$name"
            done <<< "$DEVICE_UDIDS"
          } > fastlane/devices.txt

      - name: Register IDs, devices, certs & profiles
        run: bundle exec fastlane bootstrap
      - name: Create & associate the App Group
        if: ${{ inputs.run_app_groups }}
        run: bundle exec fastlane app_groups
